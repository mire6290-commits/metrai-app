# ==============================================================================
# METRAI CALCULUS - NGINX REVERSE PROXY GATEWAY CONFIGURATION
# Copy to /etc/nginx/sites-available/metrai-calculus and link to sites-enabled
# ==============================================================================

# Rate limiting zone for api endpoints protection
limit_req_zone $binary_remote_addr zone=math_api_limit:10m rate=5r/s;

server {
    listen 80;
    server_name metraicalculus.com www.metraicalculus.com;
    
    # Force redirect all HTTP traffic to HTTPS (Production Safety)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name metraicalculus.com www.metraicalculus.com;

    # SSL Security Configuration (Install Let's Encrypt Certbot certificates)
    ssl_certificate /etc/letsencrypt/live/metraicalculus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metraicalculus.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Increase maximum upload limit (Essential for high-res math OCR snapshots!)
    client_max_body_size 20M;

    # Dynamic Proxy to Gunicorn / Uvicorn upstream
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Proxy timeouts
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # Strict rate-limiting on math computational and OCR upload APIs to avoid DDoS
    location /api/math/ {
        limit_req zone=math_api_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/ocr/ {
        limit_req zone=math_api_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; child-src 'none';" always;
}
