<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrai AI | Structure Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 3rem; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 450px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .file-drop-area { position: relative; border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 16px; padding: 2rem; transition: 0.3s; cursor: pointer; margin-bottom: 2rem; }
        .file-drop-area:hover { border-color: var(--primary); background: rgba(0, 210, 255, 0.05); }
        .upload-icon { font-size: 3rem; color: var(--primary); margin-bottom: 1rem; }
        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .btn { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; border: none; padding: 1rem 2rem; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.4s; }
        #loader { display: none; margin: 20px auto; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; margin: auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #filename { margin-top: 10px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Metrai AI Pro</h1>
        <p>Extraction intelligente de toutes les données du plan PDF</p>
        <form id="uForm" action="/upload" method="post" enctype="multipart/form-data">
            <div class="file-drop-area">
                <i class="fas fa-file-pdf upload-icon"></i>
                <div id="instr">Glissez votre plan PDF ici</div>
                <div id="filename"></div>
                <input type="file" name="file" accept=".pdf" id="fIn" required>
            </div>
            <button type="submit" class="btn">Générer Excel Global</button>
        </form>
        <div id="loader">
            <div class="spinner"></div>
            <p>Analyse complète du document en cours...</p>
        </div>
    </div>
    <script>
        const fIn = document.getElementById('fIn');
        const fName = document.getElementById('filename');
        const instr = document.getElementById('instr');
        const form = document.getElementById('uForm');
        fIn.addEventListener('change', () => { if(fIn.files[0]) { fName.innerText = fIn.files[0].name; instr.style.display='none'; } });
        form.onsubmit = () => { form.style.display='none'; document.getElementById('loader').style.display='block'; 
            setTimeout(() => { form.style.display='block'; document.getElementById('loader').style.display='none'; }, 10000);
        };
    </script>
</body>
</html>
